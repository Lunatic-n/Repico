<!DOCTYPE html>
<html lang="ja">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/top.css">

</head>

<body>

<div class="app-container">

<header class="header">

    <h1 class="logo-area">
        <img class="logo-image" src="icons/logo.png" alt="れぴこ">
    </h1>

    <div class="header-bar">

        <div class="header-buttons-left">

            <button class="icon-button help-button">
                <img src="icons/help.svg" alt="ヘルプ">
            </button>

            <button class="icon-button add-button">
                <img src="icons/add.svg" alt="新規作成">
            </button>

        </div>

        <div class="header-buttons-right">

            <button class="icon-button sort-button">
                <img src="icons/sort.svg" alt="並び替え">
            </button>

        </div>

    </div>

</header>

<section class="search-area">

    <div class="search-box">

        <img class="search-icon" src="icons/search.svg" alt="検索">

        <input class="search-input" type="text" placeholder="レシピを検索">

    </div>

</section>

<section class="recipe-summary">

    <p class="recipe-count">
        レシピ <span id="recipe-count-number">0</span>件
    </p>

</section>

<section class="recipe-list">

</section>

</div>

<script type="module" src="js/top.js"></script>

</body>
</html>
